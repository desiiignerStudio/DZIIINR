<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dziiinr Clothing | South Africa</title>
    <link rel="stylesheet" href="Style.css" />
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <div id="splash-screen" aria-hidden="true">
      <div class="logo-container">
        <h1 class="logo-text">DZ<span>III</span>NR</h1>
        <p>Dziiinr Clothing · South Africa</p>
        <div class="loader-bar"></div>
      </div>
    </div>

    <header class="navbar">
      <div>
        <h2>Dziiinr Clothing</h2>
        <small>South African custom streetwear</small>
      </div>
      <div class="zar-tag">Prices in ZAR (R)</div>
    </header>

    <main class="main-container">
      <section class="studio-panel">
        <div class="view-switcher">
          <button id="front-btn" class="toggle-btn active" data-side="front">Front Net</button>
          <button id="back-btn" class="toggle-btn" data-side="back">Back Net</button>
        </div>

        <div class="garment-container">
          <div class="hoodie-shape"></div>
          <div class="print-net-label">Print Net Area</div>
          <div class="canvas-wrapper">
            <canvas id="design-canvas" width="300" height="360"></canvas>
          </div>
        </div>
      </section>

      <aside class="controls">
        <h3>Customize your hoodie</h3>
        <p class="price" id="display-price">R 450.00</p>
        <div id="price-breakdown" class="breakdown">Base hoodie included</div>

        <label class="field-label" for="hoodie-color">Hoodie color</label>
        <select id="hoodie-color">
          <option value="#efefef">White</option>
          <option value="#111111">Black</option>
          <option value="#88ff00">Lime</option>
          <option value="#293b61">Navy</option>
        </select>

        <div class="tool-grid">
          <label class="btn secondary" for="upload-design">Upload image layer</label>
          <input id="upload-design" type="file" accept="image/*" hidden />
          <button class="btn secondary" id="add-text-btn">Add text layer</button>
          <button class="btn secondary" id="remove-bg-btn">Remove white BG</button>
          <button class="btn danger" id="delete-layer-btn">Delete selected layer</button>
        </div>

        <label class="toggle-row">
          <input type="checkbox" id="ai-upscale-toggle" />
          <span>AI clarity boost (+R75)</span>
        </label>

        <button class="btn ghost" id="view-mockup-btn">View mockup (front + back)</button>
        <button class="btn" id="add-to-cart-btn">Add to cart</button>
        <button class="btn buy" id="buy-now-btn">Buy now on WhatsApp</button>

        <div class="cart-box">
          <strong>Cart</strong>
          <ul id="cart-items"></ul>
        </div>
      </aside>
    </main>

    <dialog id="mockup-modal">
      <div class="modal-inner">
        <h3>Mockup Preview</h3>
        <div class="mockup-grid">
          <figure>
            <figcaption>Front</figcaption>
            <div class="mockup-card">
              <div class="mockup-hoodie"></div>
              <img id="front-overlay" alt="Front design overlay" />
            </div>
          </figure>
          <figure>
            <figcaption>Back</figcaption>
            <div class="mockup-card">
              <div class="mockup-hoodie"></div>
              <img id="back-overlay" alt="Back design overlay" />
            </div>
          </figure>
        </div>
        <button class="btn" id="close-mockup-btn">Close preview</button>
      </div>
    </dialog>
  </body>
</html>
